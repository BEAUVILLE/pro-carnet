<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="theme-color" content="#020617">
  <title>Accès PRO CARNET • DIGIY</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#1e293b;--bg2:#334155;--line:rgba(148,163,184,.20);--ink:#f9fafb;--muted:#94a3b8;--gold:#facc15;--green:#22c55e;--red:#ef4444}
    *{box-sizing:border-box}body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:16px;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:radial-gradient(ellipse 800px 500px at 15% -5%,rgba(250,204,21,.13),transparent 55%),radial-gradient(ellipse 700px 400px at 88% 5%,rgba(34,197,94,.10),transparent 55%),linear-gradient(180deg,var(--bg2),var(--bg))}
    .card{width:min(420px,100%);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:28px;padding:28px 24px;box-shadow:0 28px 70px rgba(0,0,0,.55)}
    .head{text-align:center;margin-bottom:22px}.ico{font-size:38px}.badge{display:inline-flex;margin-top:10px;padding:5px 12px;border-radius:999px;border:1px solid rgba(250,204,21,.30);background:rgba(250,204,21,.08);color:#fde68a;font-size:11px;font-weight:900;letter-spacing:.06em}.title{margin-top:9px;font-size:1.3rem;font-weight:1000}
    label{display:block;margin:14px 0 6px;color:var(--muted);font-size:.78rem;font-weight:900;text-transform:uppercase}.input{width:100%;min-height:54px;padding:13px 15px;border-radius:14px;border:1px solid var(--line);background:rgba(0,0,0,.22);color:var(--ink);font-size:1.08rem;font-weight:900;outline:none}.input:focus{border-color:rgba(250,204,21,.55);box-shadow:0 0 0 3px rgba(250,204,21,.10)}
    .pin{letter-spacing:.55em;text-align:center;padding-left:calc(15px + .55em)}.btn{width:100%;min-height:54px;margin-top:18px;border:0;border-radius:16px;background:linear-gradient(135deg,var(--gold),var(--green));color:#07150f;font-size:1rem;font-weight:1000;cursor:pointer}.btn:disabled{opacity:.45;cursor:not-allowed}.status{display:none;margin-top:13px;padding:11px 13px;border-radius:12px;font-size:.85rem;font-weight:900;line-height:1.45}.status.show{display:block}.status.err{background:rgba(239,68,68,.10);border:1px solid rgba(239,68,68,.30);color:#fca5a5}.status.ok{background:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.30);color:#86efac}.status.wait{background:rgba(148,163,184,.08);border:1px solid var(--line);color:var(--muted)}.note{margin-top:18px;text-align:center;color:rgba(148,163,184,.65);font-size:.75rem;font-weight:800;line-height:1.5}
  </style>
</head>
<body>
  <main class="card">
    <div class="head"><div class="ico">📒</div><div class="badge">🔑 ACCÈS DIGIY</div><div class="title">PRO CARNET</div></div>
    <form id="loginForm" novalidate>
      <label for="phone">📱 Ton numéro de téléphone</label>
      <input class="input" id="phone" type="tel" inputmode="numeric" autocomplete="tel" placeholder="221 77 XXX XX XX" maxlength="15" required>
      <label for="pin">🔢 Ton code secret</label>
      <input class="input pin" id="pin" type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="••••" maxlength="4" pattern="[0-9]{4}" required>
      <button class="btn" id="submitBtn" type="submit">Ouvrir PRO CARNET →</button>
      <div class="status" id="status" role="status" aria-live="polite"></div>
    </form>
    <div class="note">Session privée 8 h · aucune donnée financière dans l’URL.<br>DIGIY · 0% commission · 100% indépendance ∞</div>
  </main>
<script>
(()=>{
  "use strict";
  const MODULE="PAY";
  const TTL=8*60*60*1000;
  const SESSION_KEYS=["DIGIY_PAY_SESSION","DIGIY_PAY_PIN_SESSION","DIGIY_SESSION_PAY","digiy_pay_session","digiy_pay_guard_session","digiy_guard_pay_session","digiy_guard_session"];
  const SUPABASE_URL="https://wesqmwjjtsefyjnluosj.supabase.co";
  const SUPABASE_KEY="sb_publishable_tGHItRgeWDmGjnd0CK1DVQ_BIep4Ug3";
  const $=id=>document.getElementById(id);
  const norm=value=>{const d=String(value||"").replace(/\D/g,"");return d.length===9?"221"+d:d};
  const parseTime=value=>{if(typeof value==="number")return value<100000000000?value*1000:value;const s=String(value||"").trim();if(/^\d+$/.test(s)){const n=Number(s);return n<100000000000?n*1000:n}const d=Date.parse(s);return Number.isFinite(d)?d:0};
  const boolResult=data=>{const raw=Array.isArray(data)?data[0]:data;if(raw===true||raw===1)return true;if(typeof raw==="string")return ["true","t","1","ok"].includes(raw.trim().toLowerCase());return !!(raw&&(raw.ok===true||raw.access===true||raw.access_ok===true||raw.valid===true||raw.success===true||raw.status==="ok"))};
  const rowOf=data=>Array.isArray(data)?data[0]:data;
  const setStatus=(text,kind)=>{const box=$("status");box.textContent=text;box.className="status show "+kind};
  const cleanUrl=()=>{try{const u=new URL(location.href);["phone","tel","pin","code","token","session","access","auth","ok","unlocked","pin_ok","slug"].forEach(k=>u.searchParams.delete(k));history.replaceState({},"",u.pathname+u.hash)}catch(_){}};
  const validSession=session=>{if(!session||typeof session!=="object")return false;const t=Date.now(),v=parseTime(session.validated_at||session.verified_at||0),e=parseTime(session.expires_at||0);return String(session.module||"").toUpperCase()===MODULE&&norm(session.phone).length>=9&&(session.access===true||session.access_ok===true)&&v>0&&e>t&&t-v<TTL&&e<=v+TTL+60000};
  const existing=()=>{for(const key of SESSION_KEYS){for(const store of [sessionStorage,localStorage]){try{const s=JSON.parse(store.getItem(key)||"");if(validSession(s))return s}catch(_){}}}return null};
  const saveSession=(phone,slug)=>{const t=Date.now();const session={module:MODULE,public_name:"PRO CARNET",phone:norm(phone),slug:String(slug||("pay-"+norm(phone))).toLowerCase(),access:true,access_ok:true,pin_session_ok:true,validated_at:t,verified_at:t,expires_at:t+TTL};const raw=JSON.stringify(session);SESSION_KEYS.forEach(key=>{sessionStorage.setItem(key,raw);localStorage.setItem(key,raw)});sessionStorage.setItem("digiy_pay_phone",session.phone);sessionStorage.setItem("DIGIY_PAY_HUB_PHONE",session.phone);if(session.slug){sessionStorage.setItem("digiy_pay_slug",session.slug);localStorage.setItem("digiy_pay_slug",session.slug)}localStorage.removeItem("digiy_pay_phone");localStorage.removeItem("DIGIY_PAY_HUB_PHONE");return session};

  cleanUrl();
  if(existing()){location.replace("./accueil.html");return}

  const client=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:false,autoRefreshToken:false,detectSessionInUrl:false,storageKey:"digiy-carnet-pin"}});
  $("loginForm").addEventListener("submit",async event=>{
    event.preventDefault();
    const phone=norm($("phone").value),pin=String($("pin").value||"").replace(/\D/g,"");
    if(phone.length<9||pin.length!==4){setStatus("Vérifie le numéro et les 4 chiffres du code.","err");return}
    $("submitBtn").disabled=true;setStatus("Vérification du code…","wait");
    try{
      const {data,error}=await client.rpc("digiy_verify_pin",{p_phone:phone,p_module:MODULE,p_pin:pin});
      if(error)throw error;
      const row=rowOf(data);
      if(!boolResult(data)){setStatus("Code incorrect ou accès PRO CARNET inactif.","err");$("pin").value="";$("submitBtn").disabled=false;return}
      saveSession(phone,row&&typeof row==="object"?(row.slug||row.identifiant||""):"");
      setStatus("PRO CARNET ouvert. Redirection…","ok");
      setTimeout(()=>location.replace("./accueil.html"),450);
    }catch(error){setStatus("Vérification impossible. Réessaie.","err");$("submitBtn").disabled=false}
  });
})();
</script>
</body>
</html>
