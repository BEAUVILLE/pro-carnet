<!doctype html>
<html lang="fr" style="visibility:hidden">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="theme-color" content="#f4ead2">
  <title>PRO CARNET — Ma session</title>
  <script>window.DIGIY_LOGIN_URL="./pin.html";</script>
  <script src="./guard.js?v=carnet-strict-20260716"></script>
</head>
<body>
  <main id="secureStatus" style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#f4ead2;color:#241a0d;font-family:system-ui;text-align:center;font-weight:800">
    <div>Ouverture sécurisée de la session PRO CARNET…</div>
  </main>
  <script>
  (async()=>{
    "use strict";
    const session=await window.DIGIY_GUARD.requireSession({redirect:true,to:"./pin.html"});
    if(!session)return;
    const source="https://raw.githubusercontent.com/BEAUVILLE/pro-carnet/a8922e40ba35592f14f8acb92c24675efebdd3f5/session.html";
    const response=await fetch(source,{cache:"no-store"});
    if(!response.ok)throw new Error("source indisponible");
    let html=await response.text();
    html=html
      .replaceAll("Mon argent — Ma session PAY","PRO CARNET — Ma session")
      .replaceAll("SESSION PAY","SESSION CARNET")
      .replaceAll("Session PAY ouverte","Session PRO CARNET ouverte")
      .replaceAll("Aucune session PAY claire","Aucune session PRO CARNET claire")
      .replaceAll("Aucune clé PAY détectée","Aucune clé PRO CARNET détectée")
      .replaceAll("DIGIY GO PAY","DIGIY GO CARNET")
      .replaceAll("Oreille PAY","Oreille CARNET")
      .replaceAll("Ma fiche PAY","Ma fiche CARNET")
      .replaceAll('href="./hub.html"','href="./accueil.html"')
      .replaceAll('href="./cockpit.html"','href="./index.html"');
    document.open();
    document.write(html);
    document.close();
  })().catch(()=>{
    document.documentElement.style.visibility="";
    document.getElementById("secureStatus").innerHTML='<div><strong>Session momentanément indisponible.</strong><br><br><a href="./accueil.html" style="color:#167a46">Retour à PRO CARNET</a></div>';
  });
  </script>
</body>
</html>
