<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
  <title>DIGIY PAY — Saisie rapide</title>
  <meta name="theme-color" content="#06140f">
  <style>
    :root{
      --bg:#06140f;--ink:#172016;--green:#167a46;--green2:#22c55e;
      --gold:#c4973f;--gold2:#f4d27a;--red:#9a3412;
      --line:rgba(78,56,25,.22);--max:560px;
      --shadow:0 18px 48px rgba(0,0,0,.24)
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%}
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(circle at top left,rgba(244,210,122,.14),transparent 32%),
                 linear-gradient(180deg,var(--bg),#020806);
      color:#fff8e8;font-weight:850;
      -webkit-font-smoothing:antialiased;
      padding-bottom:calc(80px + env(safe-area-inset-bottom,0px))
    }
    button{cursor:pointer;-webkit-tap-highlight-color:transparent;font:inherit}

    /* HEADER */
    .header{
      position:sticky;top:0;z-index:20;
      padding:14px 16px 10px;
      background:linear-gradient(180deg,rgba(6,20,15,.98),rgba(6,20,15,.90));
      border-bottom:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(14px);
      display:flex;align-items:center;gap:10px
    }
    .header-back{
      width:42px;height:42px;border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.07);color:#fff;font-size:18px
    }
    .header-title{flex:1;text-align:center}
    .header-title small{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:1000}
    .header-title b{display:block;color:var(--gold2);font-size:19px;line-height:1.1}
    .header-add{
      width:42px;height:42px;border-radius:14px;
      border:1px solid rgba(244,210,122,.30);
      background:rgba(244,210,122,.12);color:var(--gold2);font-size:20px
    }

    /* TABS TYPE */
    .type-tabs{
      display:grid;grid-template-columns:1fr 1fr;gap:8px;
      padding:12px 14px 0
    }
    .type-tab{
      min-height:52px;border-radius:18px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.65);font-weight:1000;font-size:15px
    }
    .type-tab.active.income{background:linear-gradient(135deg,#dcfce7,#f0fdf4);color:#052215;border:none}
    .type-tab.active.expense{background:linear-gradient(135deg,#ffedd5,#fff7ed);color:#9a3412;border:none}

    /* SECTION TITRE */
    .section-head{
      padding:14px 14px 6px;
      display:flex;align-items:center;justify-content:space-between
    }
    .section-head h2{margin:0;font-size:14px;letter-spacing:.10em;text-transform:uppercase;color:var(--gold2);font-weight:1100}
    .section-head small{color:rgba(255,255,255,.45);font-size:11px;font-weight:1000}

    /* BANDE DÉFILANTE */
    .chips-scroll{
      display:flex;gap:10px;
      padding:0 14px 4px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none
    }
    .chips-scroll::-webkit-scrollbar{display:none}

    /* CHIP */
    .chip{
      flex:0 0 auto;
      min-width:88px;min-height:72px;
      border-radius:20px;
      border:2px solid transparent;
      padding:10px 8px;
      display:grid;place-items:center;align-content:center;gap:4px;
      text-align:center;font-weight:1100;
      transition:transform .12s,box-shadow .12s
    }
    .chip:active{transform:scale(.95)}
    .chip .ico{font-size:22px;line-height:1}
    .chip b{display:block;font-size:12px;line-height:1.1}
    .chip small{display:block;font-size:10px;font-weight:1000;opacity:.72;line-height:1.1}

    .chip-income{
      background:linear-gradient(135deg,#dcfce7,#f0fdf4);
      color:#052215;box-shadow:0 6px 16px rgba(34,197,94,.14)
    }
    .chip-expense{
      background:linear-gradient(135deg,#ffedd5,#fff7ed);
      color:#7c2d12;box-shadow:0 6px 16px rgba(251,146,60,.14)
    }
    .chip-neutral{
      background:linear-gradient(135deg,#fffaf0,#f1dfb8);
      color:#172016;box-shadow:0 6px 16px rgba(0,0,0,.10)
    }
    .chip.selected{
      border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(196,151,63,.28),0 8px 20px rgba(0,0,0,.18);
      transform:scale(1.04)
    }

    /* MODES PAIEMENT */
    .modes-scroll{
      display:flex;gap:8px;
      padding:0 14px 4px;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none
    }
    .modes-scroll::-webkit-scrollbar{display:none}
    .mode-chip{
      flex:0 0 auto;
      min-width:76px;min-height:48px;
      border-radius:16px;
      border:2px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.07);
      color:rgba(255,255,255,.80);
      font-size:12px;font-weight:1000;
      display:grid;place-items:center;align-content:center;gap:2px;
      padding:6px 8px;text-align:center
    }
    .mode-chip .ico{font-size:16px}
    .mode-chip.selected{
      border-color:var(--gold2);
      background:linear-gradient(135deg,rgba(244,210,122,.22),rgba(244,210,122,.08));
      color:var(--gold2)
    }

    /* MONTANT */
    .amount-zone{
      margin:10px 14px 0;
      background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.10);
      border-radius:22px;padding:14px
    }
    .amount-label{font-size:11px;letter-spacing:.10em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:1000;margin-bottom:8px}
    .amount-input{
      width:100%;min-height:64px;
      border:none;outline:none;
      background:transparent;
      color:#fff;font-size:36px;font-weight:1100;
      letter-spacing:-.5px;text-align:center
    }
    .amount-input::placeholder{color:rgba(255,255,255,.22)}
    .amount-hint{text-align:center;font-size:12px;color:rgba(255,255,255,.40);font-weight:1000;margin-top:4px}

    /* RÉSUMÉ SÉLECTION */
    .selection-summary{
      margin:10px 14px 0;
      padding:11px 14px;
      border-radius:18px;
      background:rgba(244,210,122,.10);
      border:1px solid rgba(244,210,122,.20);
      color:#fef3c7;font-size:13px;font-weight:1000;
      min-height:44px;display:flex;align-items:center;gap:8px
    }
    .selection-summary.empty{color:rgba(255,255,255,.35);border-color:rgba(255,255,255,.08);background:rgba(255,255,255,.04)}

    /* BOUTON CONFIRMER */
    .confirm-wrap{
      position:fixed;bottom:0;left:0;right:0;z-index:30;
      padding:10px 14px calc(10px + env(safe-area-inset-bottom,0px));
      background:linear-gradient(180deg,transparent,rgba(2,8,6,.95) 40%)
    }
    .confirm-btn{
      width:100%;max-width:var(--max);margin:0 auto;display:block;
      min-height:58px;border-radius:999px;border:none;
      background:linear-gradient(135deg,var(--green2),#bbf7d0);
      color:#052215;font-size:16px;font-weight:1100;
      box-shadow:0 12px 28px rgba(34,197,94,.28)
    }
    .confirm-btn:disabled{
      background:rgba(255,255,255,.10);color:rgba(255,255,255,.30);
      box-shadow:none
    }

    /* MODAL AJOUT PERSO */
    .modal-bg{
      position:fixed;inset:0;z-index:60;
      background:rgba(0,0,0,.60);
      display:none;align-items:flex-end;justify-content:center;
      padding:0
    }
    .modal-bg.open{display:flex}
    .modal{
      width:100%;max-width:var(--max);
      border-radius:28px 28px 0 0;
      background:linear-gradient(180deg,#fffaf0,#ead7aa);
      color:var(--ink);padding:20px 16px calc(20px + env(safe-area-inset-bottom,0px));
      box-shadow:var(--shadow)
    }
    .modal h3{margin:0 0 14px;font-size:18px;font-weight:1100;color:#172016}
    .field{margin-bottom:12px}
    .field label{display:block;margin-bottom:6px;color:#4c3d22;font-size:12px;letter-spacing:.06em;text-transform:uppercase;font-weight:1100}
    .field input,.field select{
      width:100%;min-height:50px;
      border-radius:16px;border:1px solid rgba(78,56,25,.22);
      background:#fff;color:#172016;padding:12px;
      font-weight:1000;outline:none;font:inherit
    }
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
    .btn-cancel{min-height:50px;border-radius:16px;border:1px solid rgba(78,56,25,.22);background:#fff;color:#172016;font-weight:1100}
    .btn-save{min-height:50px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--green2),#bbf7d0);color:#052215;font-weight:1100}

    /* TOAST */
    .toast{
      position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
      z-index:99;padding:12px 20px;border-radius:999px;
      background:rgba(7,21,15,.96);border:1px solid rgba(255,255,255,.15);
      color:#fff;font-size:13px;font-weight:1000;
      opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;
      white-space:nowrap
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}



    /* DEMI-PAGE FRAIS — listing large en colonnes */
    .open-sheet-btn{
      width:calc(100% - 28px);
      max-width:var(--max);
      margin:10px auto 0;
      min-height:54px;
      border-radius:20px;
      border:1px solid rgba(244,210,122,.28);
      background:linear-gradient(135deg,#fffaf0,#f1dfb8);
      color:#172016;
      font-weight:1100;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      box-shadow:0 10px 24px rgba(0,0,0,.16);
    }
    .open-sheet-btn b{font-size:15px;line-height:1.1}
    .open-sheet-btn small{display:block;font-size:11px;color:#6b5a3b;font-weight:1000;line-height:1.15;margin-top:2px}
    .open-sheet-btn .chev{font-size:22px;color:#7c2d12}

    body.sheet-open{overflow:hidden;touch-action:none}
    .expense-sheet-bg{
      position:fixed;inset:0;z-index:55;
      display:none;align-items:flex-end;justify-content:center;
      background:rgba(0,0,0,.46);
      padding:0;
    }
    .expense-sheet-bg.open{display:flex}
    .expense-sheet{
      width:100%;max-width:var(--max);
      height:58vh;height:58dvh;
      min-height:390px;
      max-height:680px;
      border-radius:30px 30px 0 0;
      background:linear-gradient(180deg,#fffaf0,#ead7aa);
      color:#172016;
      box-shadow:0 -22px 62px rgba(0,0,0,.38);
      border:1px solid rgba(255,255,255,.55);
      border-bottom:none;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      animation:sheetUp .22s cubic-bezier(.22,1,.36,1);
    }
    @keyframes sheetUp{from{transform:translateY(34px);opacity:.75}to{transform:translateY(0);opacity:1}}
    .sheet-handle{
      width:52px;height:5px;border-radius:999px;
      background:rgba(78,56,25,.28);
      margin:9px auto 4px;
      flex:0 0 auto;
    }
    .sheet-head{
      flex:0 0 auto;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:8px 14px 10px;
      border-bottom:1px solid rgba(78,56,25,.16);
    }
    .sheet-head small{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.10em;color:#7c2d12;font-weight:1100}
    .sheet-head strong{display:block;font-size:22px;line-height:1.05;color:#172016;font-weight:1100}
    .sheet-close{
      width:44px;height:44px;border-radius:16px;
      border:1px solid rgba(78,56,25,.20);
      background:#fff;color:#172016;font-size:20px;font-weight:1100;
      flex:0 0 auto;
    }
    .sheet-help{
      flex:0 0 auto;
      margin:10px 14px 8px;
      padding:10px 12px;
      border-radius:18px;
      background:rgba(34,197,94,.10);
      border:1px solid rgba(22,101,52,.18);
      color:#14532d;
      font-size:12px;
      line-height:1.35;
      font-weight:1000;
    }
    .sheet-grid{
      flex:1 1 auto;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      padding:0 14px 12px;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:9px;
      align-content:start;
    }
    .sheet-chip{
      min-height:62px;
      border-radius:20px;
      border:1px solid rgba(78,56,25,.16);
      background:linear-gradient(135deg,#ffedd5,#fff7ed);
      color:#7c2d12;
      padding:10px;
      text-align:left;
      display:grid;
      grid-template-columns:30px 1fr;
      gap:8px;
      align-items:center;
      font-weight:1100;
      box-shadow:0 7px 16px rgba(0,0,0,.08);
    }
    .sheet-chip:active{transform:scale(.98)}
    .sheet-chip .ico{font-size:22px;line-height:1;text-align:center}
    .sheet-chip b{display:block;font-size:13px;line-height:1.10;color:#7c2d12}
    .sheet-chip small{display:block;margin-top:2px;font-size:10px;line-height:1.10;color:#9a3412;font-weight:1000;opacity:.78}
    .sheet-add-btn{
      flex:0 0 auto;
      margin:0 14px calc(12px + env(safe-area-inset-bottom,0px));
      min-height:54px;
      border-radius:999px;
      border:none;
      background:linear-gradient(135deg,var(--green2),#bbf7d0);
      color:#052215;
      font-size:15px;
      font-weight:1100;
      box-shadow:0 10px 24px rgba(34,197,94,.22);
    }
    @media(min-width:560px){
      .expense-sheet{border-radius:30px 30px 0 0}
      .sheet-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    }

    @media(min-width:560px){
      .type-tabs,.section-head,.chips-scroll,.modes-scroll,.amount-zone,.selection-summary{
        max-width:var(--max);margin-left:auto;margin-right:auto
      }
      .chips-scroll,.modes-scroll{padding-left:0;padding-right:0}
    }
  </style>
</head>
<body>

<header class="header">
  <button class="header-back" onclick="history.back()">‹</button>
  <div class="header-title">
    <small>DIGIY PAY</small>
    <b>Saisie rapide</b>
  </div>
  <button class="header-add" id="btnAddChip" title="Ajouter un libellé">＋</button>
</header>

<div class="type-tabs">
  <button class="type-tab income active" id="tabIncome" type="button">＋ Entrée</button>
  <button class="type-tab expense" id="tabExpense" type="button">− Sortie</button>
</div>

<!-- LIBELLÉS -->
<div class="section-head">
  <h2 id="labelSectionTitle">Nature de l'entrée</h2>
  <small>défile →</small>
</div>
<div class="chips-scroll" id="chipsWrap"></div>
<button class="open-sheet-btn" id="openExpenseSheetBtn" type="button">
  <span><b>📋 Voir tous les frais</b><small>Demi-page en colonnes · une touche de moins</small></span>
  <span class="chev">⌄</span>
</button>

<!-- MODES PAIEMENT -->
<div class="section-head">
  <h2>Mode de paiement</h2>
  <small>défile →</small>
</div>
<div class="modes-scroll" id="modesWrap"></div>

<!-- MONTANT -->
<div class="amount-zone">
  <div class="amount-label">Montant (F CFA)</div>
  <input class="amount-input" id="amountInput" type="number" inputmode="numeric" min="0" step="1" placeholder="0">
  <div class="amount-hint" id="amountHint">Choisis d'abord un libellé</div>
</div>

<!-- RÉSUMÉ -->
<div class="selection-summary empty" id="summary">Aucune sélection</div>

<!-- CONFIRMER -->
<div class="confirm-wrap">
  <button class="confirm-btn" id="confirmBtn" disabled type="button">Confirmer la trace</button>
</div>

<!-- MODAL AJOUT -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <h3>Ajouter un libellé</h3>
    <div class="field">
      <label>Nom</label>
      <input id="newLabel" type="text" placeholder="Ex : Prime, Loyer, Abonnement…">
    </div>
    <div class="grid2">
      <div class="field">
        <label>Type</label>
        <select id="newType">
          <option value="income">Entrée</option>
          <option value="expense">Sortie</option>
        </select>
      </div>
      <div class="field">
        <label>Icône</label>
        <input id="newIcon" type="text" placeholder="💰" maxlength="2">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancelAdd" type="button">Annuler</button>
      <button class="btn-save" id="btnSaveAdd" type="button">Ajouter</button>
    </div>
  </div>
</div>



<!-- DEMI-PAGE FRAIS -->
<div class="expense-sheet-bg" id="expenseSheet" aria-hidden="true">
  <section class="expense-sheet" role="dialog" aria-modal="true" aria-label="Listing des frais">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div>
        <small>DIGIY PAY</small>
        <strong>Choisir un frais</strong>
      </div>
      <button class="sheet-close" id="closeExpenseSheet" type="button" aria-label="Fermer">×</button>
    </div>
    <div class="sheet-help">Touche un frais, pose le montant, confirme. Le pro peut ajouter ses propres libellés avec le bouton vert.</div>
    <div class="sheet-grid" id="expenseSheetGrid"></div>
    <button class="sheet-add-btn" id="sheetAddExpense" type="button">＋ Ajouter mon libellé de frais</button>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  'use strict';

  const STORAGE_KEY = 'digiy_pay_frais_v1';
  const PAY_STORAGE_KEY = 'digiy_pay_baptiste_reel_v2';
  // Page appelée depuis le cockpit PRO.
  // Pas de PIN ici : la protection reste portée par index.html / guard.js
  // et, plus tard, par le VPS côté serveur.

  // Données par défaut
  const DEFAULT_INCOME = [
    {id:'li-salaire',   label:'Salaire',     ico:'💼', type:'income'},

    {id:'li-retraite',  label:'Retraite',    ico:'🏦', type:'income'},

    {id:'li-autres',    label:'Autres',      ico:'✨', type:'income'},

  const DEFAULT_EXPENSE = [

    {id:'le-woyofal',      label:'Woyofal',           ico:'⚡', type:'expense'},
    {id:'le-seneau',       label:'SEN\'EAU',          ico:'💧', type:'expense'},
    {id:'le-wifi',         label:'Wi-Fi',             ico:'📡', type:'expense'},
    {id:'le-orange',       label:'Orange',            ico:'🟠', type:'expense'},

    {id:'le-assurance',    label:'Assurance',         ico:'🛡️', type:'expense'},
    {id:'le-impots',       label:'Impôts',            ico:'📋', type:'expense'},
    {id:'le-banque',       label:'Frais bancaire',    ico:'🏦', type:'expense'},
    {id:'le-dette',        label:'Remb. dette',       ico:'📤', type:'expense'},
    {id:'le-aide-famille', label:'Aide famille',      ico:'🤝', type:'expense'},
    {id:'le-tabaski',      label:'Tabaski',           ico:'🐑', type:'expense'},
    {id:'le-evenement',    label:'Événement',         ico:'🎉', type:'expense'},
    {id:'le-voyage',       label:'Voyage',            ico:'✈️', type:'expense'},
    {id:'le-divers',       label:'Divers',            ico:'📦', type:'expense'},
  ];
  const MODES = [
    {id:'m-wave',   label:'Wave',         ico:'🌊'},
    {id:'m-cash',   label:'Espèces',      ico:'💵'},
    {id:'m-om',     label:'Orange Money', ico:'📱'},
    {id:'m-carte',  label:'Carte',        ico:'💳'},
    {id:'m-virement',label:'Virement',    ico:'🏦'},
    {id:'m-sendwave',label:'Sendwave',    ico:'✈️'},
  ];

  // State
  let state = load();
  let currentType = (new URLSearchParams(location.search).get('type') === 'income') ? 'income' : 'expense';
  let selectedLabel = null;
  let selectedMode = null;

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      const s = raw ? JSON.parse(raw) : {};
      s.customIncome  = Array.isArray(s.customIncome)  ? s.customIncome  : [];
      s.customExpense = Array.isArray(s.customExpense) ? s.customExpense : [];
      return s;
    } catch(e) { return {customIncome:[], customExpense:[]}; }
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  function allIncome()  { return DEFAULT_INCOME.concat(state.customIncome); }
  function allExpense() { return DEFAULT_EXPENSE.concat(state.customExpense); }
  function currentChips() { return currentType === 'income' ? allIncome() : allExpense(); }

  // RENDER CHIPS
  const chipsWrap = document.getElementById('chipsWrap');
  const modesWrap = document.getElementById('modesWrap');
  const summary   = document.getElementById('summary');
  const confirmBtn= document.getElementById('confirmBtn');
  const amountInput = document.getElementById('amountInput');
  const amountHint  = document.getElementById('amountHint');
  const labelSectionTitle = document.getElementById('labelSectionTitle');
  const openExpenseSheetBtn = document.getElementById('openExpenseSheetBtn');
  const expenseSheet = document.getElementById('expenseSheet');
  const expenseSheetGrid = document.getElementById('expenseSheetGrid');
  const closeExpenseSheetBtn = document.getElementById('closeExpenseSheet');
  const sheetAddExpenseBtn = document.getElementById('sheetAddExpense');

  function renderChips() {
    selectedLabel = null;
    const chips = currentChips();
    chipsWrap.innerHTML = chips.map(c => `
      <button class="chip ${currentType === 'income' ? 'chip-income' : 'chip-expense'}"
              type="button" data-chip-id="${c.id}">
        <span class="ico">${c.ico}</span>
        <b>${c.label}</b>
      </button>
    `).join('');
    labelSectionTitle.textContent = currentType === 'income' ? "Nature de l'entrée" : "Type de dépense";
    if(openExpenseSheetBtn) openExpenseSheetBtn.style.display = currentType === 'expense' ? 'flex' : 'none';
    renderExpenseSheet();
    updateSummary();
  }

  function renderModes() {
    modesWrap.innerHTML = MODES.map(m => `
      <button class="mode-chip" type="button" data-mode-id="${m.id}">
        <span class="ico">${m.ico}</span>
        <span>${m.label}</span>
      </button>
    `).join('');
  }


  function renderExpenseSheet(){
    if(!expenseSheetGrid) return;
    const frais = allExpense();
    expenseSheetGrid.innerHTML = frais.map(c => `
      <button class="sheet-chip" type="button" data-expense-id="${c.id}">
        <span class="ico">${c.ico}</span>
        <span><b>${c.label}</b><small>Frais rapide</small></span>
      </button>
    `).join('');
  }

  function openExpenseSheet(){
    if(!expenseSheet) return;
    renderExpenseSheet();
    expenseSheet.classList.add('open');
    expenseSheet.setAttribute('aria-hidden','false');
    document.body.classList.add('sheet-open');
  }

  function closeExpenseSheet(){
    if(!expenseSheet) return;
    expenseSheet.classList.remove('open');
    expenseSheet.setAttribute('aria-hidden','true');
    document.body.classList.remove('sheet-open');
  }

  function selectChipById(id, closeSheetAfter){
    const chip = currentChips().find(c => c.id === id) || allExpense().find(c => c.id === id) || allIncome().find(c => c.id === id);
    if(!chip) return;
    currentType = chip.type === 'income' ? 'income' : 'expense';
    document.getElementById('tabIncome').classList.toggle('active', currentType === 'income');
    document.getElementById('tabExpense').classList.toggle('active', currentType === 'expense');
    renderChips();
    selectedLabel = chip;
    chipsWrap.querySelectorAll('.chip').forEach(c => c.classList.toggle('selected', c.getAttribute('data-chip-id') === id));
    amountHint.textContent = 'Entre le montant';
    updateSummary();
    if(closeSheetAfter) closeExpenseSheet();
    setTimeout(() => amountInput.focus(), 120);
  }

  // EVENTS CHIPS
  chipsWrap.addEventListener('click', e => {
    const btn = e.target.closest('[data-chip-id]');
    if (!btn) return;
    selectChipById(btn.getAttribute('data-chip-id'), false);
  });

  // EVENTS MODES
  modesWrap.addEventListener('click', e => {
    const btn = e.target.closest('[data-mode-id]');
    if (!btn) return;
    modesWrap.querySelectorAll('.mode-chip').forEach(c => c.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMode = MODES.find(m => m.id === btn.getAttribute('data-mode-id'));
    updateSummary();
  });

  // TABS
  function setType(type, openSheet){
    currentType = type === 'income' ? 'income' : 'expense';
    document.getElementById('tabIncome').classList.toggle('active', currentType === 'income');
    document.getElementById('tabExpense').classList.toggle('active', currentType === 'expense');
    renderChips();
    if(currentType === 'expense' && openSheet) openExpenseSheet();
    if(currentType === 'income') closeExpenseSheet();
  }

  document.getElementById('tabIncome').addEventListener('click', () => setType('income', false));
  document.getElementById('tabExpense').addEventListener('click', () => setType('expense', true));

  if(openExpenseSheetBtn) openExpenseSheetBtn.addEventListener('click', openExpenseSheet);
  if(closeExpenseSheetBtn) closeExpenseSheetBtn.addEventListener('click', closeExpenseSheet);
  if(expenseSheet) expenseSheet.addEventListener('click', e => { if(e.target === expenseSheet) closeExpenseSheet(); });
  if(expenseSheetGrid) expenseSheetGrid.addEventListener('click', e => {
    const btn = e.target.closest('[data-expense-id]');
    if(!btn) return;
    selectChipById(btn.getAttribute('data-expense-id'), true);
  });
  if(sheetAddExpenseBtn) sheetAddExpenseBtn.addEventListener('click', () => {
    closeExpenseSheet();
    currentType = 'expense';
    document.getElementById('newLabel').value = '';
    document.getElementById('newIcon').value = '';
    document.getElementById('newType').value = 'expense';
    document.getElementById('addModal').classList.add('open');
    setTimeout(() => document.getElementById('newLabel').focus(), 150);
  });
  document.addEventListener('keydown', e => { if(e.key === 'Escape') closeExpenseSheet(); });

  // SUMMARY + CONFIRM
  function updateSummary() {
    const amount = Number(amountInput.value || 0);
    const ok = selectedLabel && selectedMode && amount > 0;
    confirmBtn.disabled = !ok;
    if (!selectedLabel && !selectedMode) {
      summary.textContent = 'Aucune sélection';
      summary.classList.add('empty');
    } else {
      summary.classList.remove('empty');
      const parts = [];
      if (selectedLabel) parts.push(selectedLabel.ico + ' ' + selectedLabel.label);
      if (selectedMode)  parts.push(selectedMode.ico + ' ' + selectedMode.label);
      if (amount > 0)    parts.push(amount.toLocaleString('fr-FR') + ' F');
      summary.textContent = parts.join('  ·  ');
    }
    confirmBtn.textContent = ok
      ? (currentType === 'income' ? '✅ Confirmer l\'entrée' : '✅ Confirmer la dépense')
      : 'Confirmer la trace';
  }
  amountInput.addEventListener('input', updateSummary);

  // CONFIRMER → injecter dans PAY
  confirmBtn.addEventListener('click', () => {
    const amount = Math.round(Number(amountInput.value || 0));
    if (!selectedLabel || !selectedMode || amount <= 0) return;

    try {
      const raw = localStorage.getItem(PAY_STORAGE_KEY);
      const data = raw ? JSON.parse(raw) : null;
      if (data && Array.isArray(data.movements)) {
        const id = 'm' + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4);
        data.movements.push({
          id,
          pocket: currentType === 'income' ? 'perso' : 'perso',
          type: currentType,
          mode: selectedMode.label,
          amount,
          label: selectedLabel.label,
          activity: currentType === 'income' ? 'Maison' : 'Charges',
          person: '#soi-même',
          note: '',
          ts: new Date().toISOString(),
        });
        localStorage.setItem(PAY_STORAGE_KEY, JSON.stringify(data));
      }
    } catch(e) {}

    showToast((currentType === 'income' ? '＋ ' : '− ') + amount.toLocaleString('fr-FR') + ' F · ' + selectedLabel.label);

    // Reset
    amountInput.value = '';
    chipsWrap.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
    modesWrap.querySelectorAll('.mode-chip').forEach(c => c.classList.remove('selected'));
    selectedLabel = null;
    selectedMode = null;
    updateSummary();
  });

  // MODAL AJOUT
  document.getElementById('btnAddChip').addEventListener('click', () => {
    document.getElementById('newLabel').value = '';
    document.getElementById('newIcon').value = '';
    document.getElementById('newType').value = currentType;
    document.getElementById('addModal').classList.add('open');
    setTimeout(() => document.getElementById('newLabel').focus(), 150);
  });
  document.getElementById('btnCancelAdd').addEventListener('click', () => {
    document.getElementById('addModal').classList.remove('open');
  });
  document.getElementById('addModal').addEventListener('click', e => {
    if (e.target === document.getElementById('addModal'))
      document.getElementById('addModal').classList.remove('open');
  });
  document.getElementById('btnSaveAdd').addEventListener('click', () => {
    const label = document.getElementById('newLabel').value.trim();
    const type  = document.getElementById('newType').value;
    const ico   = document.getElementById('newIcon').value.trim() || '📌';
    if (!label) { document.getElementById('newLabel').focus(); return; }
    const id = 'custom-' + Date.now();
    const item = {id, label, ico, type};
    if (type === 'income') state.customIncome.push(item);
    else state.customExpense.push(item);
    save();
    document.getElementById('addModal').classList.remove('open');
    if (type === currentType) renderChips();
    renderExpenseSheet();
    if (type === 'expense') openExpenseSheet();
    showToast('✅ ' + label + ' ajouté');
  });

  // TOAST
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // INIT
  setType(currentType, false);
  renderModes();
  updateSummary();
  if(currentType === 'expense') setTimeout(openExpenseSheet, 220);

})();
</script>
</body>
</html>
