<!doctype html>
<html lang="fr" style="visibility:hidden">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="theme-color" content="#06140f">
  <title>PRO CARNET — Saisie rapide</title>
  <script>window.DIGIY_LOGIN_URL="./pin.html";</script>
  <script src="./guard.js?v=carnet-strict-20260716"></script>
</head>
<body>
  <main id="secureStatus" style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#06140f;color:#fff8e8;font-family:system-ui;text-align:center;font-weight:800">
    <div>Ouverture sécurisée de la saisie rapide…</div>
  </main>
  <script>
  (async()=>{
    "use strict";
    const session=await window.DIGIY_GUARD.requireSession({redirect:true,to:"./pin.html"});
    if(!session)return;
    const source="https://raw.githubusercontent.com/BEAUVILLE/pro-carnet/a8922e40ba35592f14f8acb92c24675efebdd3f5/frais.html";
    const response=await fetch(source,{cache:"no-store"});
    if(!response.ok)throw new Error("source indisponible");
    let html=await response.text();
    html=html
      .replaceAll("DIGIY PAY — Saisie rapide","PRO CARNET — Saisie rapide")
      .replaceAll("<small>DIGIY PAY</small>","<small>PRO CARNET</small>");
    document.open();
    document.write(html);
    document.close();
  })().catch(()=>{
    document.documentElement.style.visibility="";
    document.getElementById("secureStatus").innerHTML='<div><strong>Saisie rapide momentanément indisponible.</strong><br><br><a href="./index.html" style="color:#f4d27a">Retour à PRO CARNET</a></div>';
  });
  </script>
</body>
</html>
