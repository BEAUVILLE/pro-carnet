<style>
*{box-sizing:border-box}body{margin:0;min-height:100dvh;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:radial-gradient(720px 380px at 8% -10%,rgba(34,197,94,.25),transparent 62%),linear-gradient(180deg,#06140d,#0b1d12 58%,#102015);color:white;padding:10px;font-weight:900}a{color:inherit;text-decoration:none}button,textarea{font:inherit}.wrap{width:min(880px,100%);margin:auto}.top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}.top b{color:#f4c86a}.top a{font-size:12px;border:1px solid rgba(244,200,106,.24);border-radius:999px;padding:8px 10px;background:rgba(255,255,255,.07)}.box{border:1px solid rgba(244,200,106,.28);border-radius:22px;background:#102015;padding:14px;box-shadow:0 18px 44px rgba(0,0,0,.26)}h1{font-size:clamp(40px,13vw,76px);line-height:.86;letter-spacing:-.075em;margin:4px 0 10px}.lead{color:rgba(255,255,255,.82);line-height:1.35;margin:0 0 12px}.preview{display:grid;grid-template-columns:1fr 1fr;gap:8px}.mini{background:#0b1d12;border:1px solid rgba(244,200,106,.18);border-radius:16px;padding:11px}.mini small{display:block;color:rgba(255,255,255,.64);font-size:11px;margin-bottom:4px}.mini b{display:block;font-size:17px;word-break:break-word}.amount{margin-top:10px;background:linear-gradient(135deg,#14532d,#15803d);border-radius:18px;padding:13px;display:flex;justify-content:space-between;gap:10px;align-items:center}.amount b{color:#f4c86a;font-size:30px}.modes{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px}.mode{min-height:42px;border-radius:14px;background:#0b1d12;color:white;border:1px solid rgba(244,200,106,.22);font-weight:1000}.mode.active{background:#f4c86a;color:#102015}textarea{width:100%;min-height:88px;margin-top:10px;border-radius:16px;border:1px solid rgba(244,200,106,.30);background:#06140d;color:white;padding:12px;font-size:15px;font-weight:850;resize:vertical}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.btn{min-height:52px;border:1px solid rgba(244,200,106,.22);border-radius:16px;background:#102015;color:white;font-weight:1000;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px}.green{background:linear-gradient(135deg,#bbf7d0,#22c55e);color:#052e16}.gold{background:linear-gradient(135deg,#ffe8a8,#f4c86a);color:#102015}.red{background:#7f1d1d}.status,.proof{margin-top:10px;padding:11px;border-radius:16px;background:rgba(255,255,255,.08);border:1px dashed rgba(244,200,106,.26);font-size:13px;line-height:1.35;white-space:pre-wrap}.proof{display:none;color:#fff3cf}.proof.show{display:block}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(40px);opacity:0;width:min(520px,calc(100% - 28px));background:#102015;color:#fff;border:1px solid rgba(244,200,106,.24);border-radius:22px;padding:14px 16px;box-shadow:0 18px 48px rgba(0,0,0,.34);font-weight:900;text-align:center;transition:.22s;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:640px){.preview,.actions{grid-template-columns:1fr}.modes{grid-template-columns:1fr 1fr}}

<body>
<main class="wrap">
  <div class="top"><b>💳 PAY · Pont métier</b><a href="./cockpit.html">🌡️ Mouvements</a></div>
  <section class="box">
    <h1>Vérifie l’argent.</h1>
    <p class="lead">Le module garde son métier. PAY reçoit seulement l’argent final. Le pro vérifie puis valide dans la caisse.</p>
    <div class="preview">
      <div class="mini"><small>Origine</small><b id="rFrom">—</b></div>
      <div class="mini"><small>Type</small><b id="rType">—</b></div>
      <div class="mini"><small>Catégorie</small><b id="rCategory">—</b></div>
      <div class="mini"><small>Canal</small><b id="rChannel">—</b></div>
    </div>
    <div class="amount"><span>Montant</span><b id="rAmount">0 F</b></div>
    <div class="modes"><button class="mode" data-pay="Cash">Cash</button><button class="mode" data-pay="Wave">Wave</button><button class="mode" data-pay="Orange Money">Orange</button><button class="mode" data-pay="Carte">Carte</button></div>
    <textarea id="noteText"></textarea>
    <div class="status" id="statusBox">Brouillon reçu. Validation humaine obligatoire.</div>
    <div class="actions"><button class="btn green" id="validateBtn">✅ Valider PAY</button><button class="btn gold" id="copyBtn">📋 Copier</button><a class="btn" href="./action.html">🎙️ ACTION PAY</a><button class="btn red" id="clearBtn">🧹 Nettoyer</button></div>
    <div class="proof" id="proofBox"></div>
  </section>
</main>
<div class="toast" id="toast"></div>
<script>
(function(){
"use strict";
const STORAGE_KEY="DIGIY_PAY_ACTIONS", LATEST_KEY="DIGIY_PAY_PENDING_ACTION";
const $=id=>document.getElementById(id);
const els={rFrom:$("rFrom"),rType:$("rType"),rCategory:$("rCategory"),rChannel:$("rChannel"),rAmount:$("rAmount"),noteText:$("noteText"),statusBox:$("statusBox"),validateBtn:$("validateBtn"),copyBtn:$("copyBtn"),clearBtn:$("clearBtn"),proofBox:$("proofBox"),toast:$("toast")};
let selectedPay="Cash", currentDraft=null;
function toast(msg){els.toast.textContent=msg;els.toast.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>els.toast.classList.remove("show"),2600)}
function money(n){return Math.round(Number(n)||0).toLocaleString("fr-FR")+" F"}
function cleanNum(v){return Number(String(v||"0").replace(/[^0-9]/g,""))||0}
function norm(v){return String(v||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
function readJSON(k,f){try{const r=localStorage.getItem(k);return r?JSON.parse(r):f}catch(_){return f}}
function writeJSON(k,v){localStorage.setItem(k,JSON.stringify(v))}
function fmtDate(v){const d=new Date(v);return isNaN(d.getTime())?"—":d.toLocaleString("fr-FR")}
function proofRef(from){return "PAY-"+String(from||"MODULE").toUpperCase()+"-"+Date.now()}
function typeInfo(type,note){const t=norm((type||"")+" "+(note||""));if(/expense|depense|menage|essence|sortie|achat/.test(t))return{type:"expense",label:"Dépense"};if(/receivable|a recevoir|reste|doit|dette|credit/.test(t))return{type:"receivable",label:"À recevoir"};return{type:"income",label:"Recette"}}
function fromUrl(){const q=new URLSearchParams(location.search);const note=q.get("note")||"";const from=q.get("from")||"MODULE";const kind=typeInfo(q.get("type"),note);return{id:"PAY_FROM_"+from+"_"+Date.now(),proofRef:q.get("proofRef")||proofRef(from),source:from,sourceLabel:from,module:"PAY",type:kind.type,typeLabel:kind.label,amount:cleanNum(q.get("amount")),currency:"XOF",channel:q.get("channel")||"Cash",who:q.get("who")||from,category:q.get("category")||kind.label+" "+from,note:note||((kind.type==="expense"?"dépense ":"recette ")+(q.get("category")||from)+" "+cleanNum(q.get("amount"))+" "+(q.get("channel")||"Cash")),status:"draft",requiresHumanValidation:true,createdAt:new Date().toISOString(),safety:{moduleKeepsBusiness:true,payKeepsFinalMoney:true,noAutoPayment:true,noAutoConfirmation:true,humanValidationRequired:true}}}
function renderDraft(d){currentDraft=d;selectedPay=d.channel||"Cash";els.rFrom.textContent=d.source||"MODULE";els.rType.textContent=d.typeLabel||"—";els.rCategory.textContent=d.category||"—";els.rChannel.textContent=selectedPay;els.rAmount.textContent=money(d.amount);els.noteText.value=d.note||"";document.querySelectorAll(".mode").forEach(b=>b.classList.toggle("active",b.dataset.pay===selectedPay));els.statusBox.textContent="Brouillon reçu. Vérifie avant validation PAY.";toast(d.amount?"Brouillon reçu dans PAY.":"Montant à vérifier.")}
function channelForTools(v){const t=norm(v);if(t.includes("wave"))return"wave";if(t.includes("cash"))return"cash";if(t.includes("orange"))return"orange_money";if(t.includes("bank")||t.includes("virement"))return"bank";return"other"}
function toMovementInput(m){const isExpense=m.type==="expense";const isReceivable=m.type==="receivable";return{direction:isExpense?"out":"in",scope:"pro",kind:isExpense?"expense":isReceivable?"other":"sale",category:isExpense?"business_expense":isReceivable?"quick_note":"payment_received",amount_xof:m.amount,channel:channelForTools(m.channel),label:m.category||m.typeLabel||"Mouvement module",note_text:m.note,source_module:m.source||"PAY",source_id:m.proofRef,origin:"manual",status:isReceivable?"pending":"posted",meta:{module_bridge:true,bridge_origin:"module_bridge",who:m.who||null,type_from_module:m.type,category_from_module:m.category||null}}}
function proofText(m,ok,msg){return["PREUVE PAY — DIGIYLYFE","Statut caisse : "+(ok?"INSCRIT":"NON INSCRIT"),msg?"Message : "+msg:null,"Origine : "+(m.source||"MODULE"),"Référence : "+(m.proofRef||m.id||"—"),"Date : "+fmtDate(m.validatedAt||m.createdAt),"Type : "+(m.typeLabel||"Mouvement PAY"),"Montant : "+money(m.amount),"Canal : "+(m.channel||"—"),"Client / origine : "+(m.who||m.source||"MODULE"),"Catégorie : "+(m.category||"—"),"Note : "+(m.note||"—"),"Validation humaine : oui"].filter(Boolean).join("\n")}
function saveLocal(m,ok,msg,res){const movement={...m,status:"validated",validatedAt:new Date().toISOString(),validatedBy:"pro",requiresHumanValidation:false,insertedInMovements:ok,insertResult:res||null,proofText:proofText(m,ok,msg)};const list=readJSON(STORAGE_KEY,[]);list.unshift(movement);writeJSON(STORAGE_KEY,list.slice(0,200));writeJSON(LATEST_KEY,movement);els.proofBox.textContent=movement.proofText;els.proofBox.classList.add("show")}
async function insertTrueMovement(m){if(!window.DIGIY_PAY_TOOLS||typeof window.DIGIY_PAY_TOOLS.insertMovement!=="function")return{ok:false,error:"Outil PAY non chargé."};return await window.DIGIY_PAY_TOOLS.insertMovement(toMovementInput(m))}
async function validate(){if(!currentDraft)return;if(!currentDraft.amount||currentDraft.amount<=0){toast("Montant manquant.");return}els.validateBtn.disabled=true;els.validateBtn.textContent="⏳ Validation…";const movement={...currentDraft,note:els.noteText.value.trim()||currentDraft.note,channel:selectedPay,validatedAt:new Date().toISOString()};let res;try{res=await insertTrueMovement(movement)}catch(e){res={ok:false,error:e?.message||"Erreur insertion"}}if(res&&res.ok){saveLocal(movement,true,"Mouvement inscrit dans les vrais mouvements PAY.",res);els.statusBox.textContent="✅ Mouvement inscrit dans la caisse PAY.";toast("Mouvement inscrit dans PAY.")}else{const msg=(res&&res.error)||res?.code||"Session PAY / téléphone / slug à vérifier.";saveLocal(movement,false,msg,res);els.statusBox.textContent="⚠️ Preuve locale gardée, mais non inscrit : "+msg;toast("Non inscrit : vérifie le message.")}els.validateBtn.disabled=false;els.validateBtn.textContent="✅ Valider PAY"}
function copyDraft(){const d=currentDraft;if(!d)return;const text=["DIGIY PAY — Brouillon métier","Origine : "+d.source,"Type : "+d.typeLabel,"Montant : "+money(d.amount),"Canal : "+selectedPay,"Catégorie : "+d.category,"Note : "+(els.noteText.value||d.note)].join("\n");navigator.clipboard?.writeText(text).then(()=>toast("Copié.")).catch(()=>prompt("Copie le brouillon :",text))}
document.querySelectorAll(".mode").forEach(btn=>btn.addEventListener("click",()=>{document.querySelectorAll(".mode").forEach(b=>b.classList.remove("active"));btn.classList.add("active");selectedPay=btn.dataset.pay||"Cash";els.rChannel.textContent=selectedPay;if(currentDraft)currentDraft.channel=selectedPay}));
els.validateBtn.addEventListener("click",validate);els.copyBtn.addEventListener("click",copyDraft);els.clearBtn.addEventListener("click",()=>{localStorage.removeItem(LATEST_KEY);toast("Pont PAY nettoyé.")});
renderDraft(fromUrl());
})();
</script>
</body>
